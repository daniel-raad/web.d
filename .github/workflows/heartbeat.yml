name: Heartbeat Reminders

on:
  schedule:
    # 6AM, 10AM, 1PM, 6PM, 9PM, 11PM GMT
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 13 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Send heartbeat
        run: |
          curl -f -X POST \
            -H "x-heartbeat-secret: ${{ secrets.HEARTBEAT_SECRET }}" \
            -H "Content-Type: application/json" \
            https://www.danielraad.co.uk/api/heartbeat
