name: Heartbeat Reminders

on:
  schedule:
    # 6:30 AM GMT — morning anchor (post-training, pre-work)
    - cron: "30 6 * * *"
    # 9:30 PM GMT — evening review + plan tomorrow
    - cron: "30 21 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Send heartbeat
        run: |
          curl -f -X POST \
            -H "x-heartbeat-secret: ${{ secrets.HEARTBEAT_SECRET }}" \
            -H "Content-Type: application/json" \
            https://www.danielraad.co.uk/api/heartbeat
