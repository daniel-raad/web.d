name: Smart Nudges

on:
  schedule:
    # 3 PM GMT — single mid-afternoon opportunistic check.
    # Only fires if something genuinely needs attention (low habits,
    # overdue todos, low sleep, streak at risk). Often silent.
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Check and nudge
        run: |
          curl -f -X POST \
            -H "x-heartbeat-secret: ${{ secrets.HEARTBEAT_SECRET }}" \
            -H "Content-Type: application/json" \
            https://www.danielraad.co.uk/api/nudge
