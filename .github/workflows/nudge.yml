name: Smart Nudges

on:
  schedule:
    # Every 2 hours from 10AM to 10PM GMT
    - cron: "0 10,12,14,16,18,20,22 * * *"
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Check and nudge
        run: |
          curl -f -X POST \
            -H "x-heartbeat-secret: ${{ secrets.HEARTBEAT_SECRET }}" \
            -H "Content-Type: application/json" \
            https://www.danielraad.co.uk/api/nudge
